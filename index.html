<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator-Project</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>Welcome to the Calculator Program!</header>
    <p id="p1">This calculator has four functions:</p>
    <ul>
        <li>Addition</li>
        <li>Subtraction</li>
        <li>Division</li>
        <li>Multiplication</li>
    </ul>
    <p id="p2"><strong>Go ahead and try it!</strong></p>

    <!-- This div is for the body of the calculator -->
    <div id="calculator-frame">

        <!-- The "diplay" div is empty so that the characters 
             below can be diplayed in the screen -->
        <div id="display"></div>

        <div id="special-buttons">
            <button id="on">ON</button>
            <button id="clear">CLEAR</button>
        </div>

        <!-- This div is setup to get a grid 
             of numbers within the calculator  -->
        <div id="numbers">
            <div id="top-row">
                <button id="numbers-top-row-seven">7</button>
                <button id="numbers-top-row-eight">8</button>
                <button id="numbers-top-row-nine">9</button>
                <button class="operator" id="addition">+</button>
            </div>
            <div id="mid-row">
                <button id="numbers-mid-row-four">4</button>
                <button id="numbers-mid-row-five">5</button>
                <button id="numbers-mid-row-six">6</button>
                <button class="operator" id="subtraction">-</button>
            </div>
            <div id="bottom-row">
                <button id="numbers-bottom-row-one">1</button>
                <button id="numbers-bottom-row-two">2</button>
                <button id="numbers-bottom-row-three">3</button>
                <button class="operator" id="multiply">x</button>
            </div>
            <div id="final-row">
                <button id="numbers-final-row-zero">0</button>
                <button id="numbers-final-row-dot">.</button>
                <button class="operator" id="divide">/</button>
            </div>
            <div id="equals-row">
                <button class="operator" id="equals">=</button>
            </div>
        </div>
        
    </div>






    <footer></footer>
</body>
</html>
